version: '3.8'

services:
  backend:
    build: ./backend
    container_name: stock_analysis_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      - redis
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: stock_analysis_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    image: redis:alpine
    container_name: stock_analysis_redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:latest
    container_name: stock_analysis_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
